<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wheelhub Color Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; color:#ccc; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; height:100vh; overflow:hidden; font-size:13px; }

#sidebar { width:280px; min-width:280px; background:#1e1e1e; border-right:1px solid #2d2d2d; display:flex; flex-direction:column; overflow:hidden; }
#sidebar-scroll { flex:1; overflow-y:auto; padding:0 0 12px; }
#sidebar-scroll::-webkit-scrollbar { width:4px; }
#sidebar-scroll::-webkit-scrollbar-thumb { background:#444; border-radius:2px; }

.section { border-bottom:1px solid #2d2d2d; }
.section-header { display:flex; align-items:center; gap:6px; padding:10px 14px; cursor:pointer; user-select:none; font-size:11px; font-weight:600; color:#888; letter-spacing:0.06em; text-transform:uppercase; }
.section-header:hover { color:#ccc; }
.section-header .arrow { font-size:9px; transition:transform 0.15s; }
.section-header.collapsed .arrow { transform:rotate(-90deg); }
.section-body { padding:8px 14px 12px; }

.ctrl { display:flex; align-items:center; gap:8px; margin:5px 0; }
.ctrl label { width:88px; min-width:88px; font-size:12px; color:#888; }
.ctrl input[type=range] { flex:1; height:3px; cursor:pointer; appearance:none; -webkit-appearance:none; border-radius:2px; outline:none; }
.ctrl input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:#fff; border:2px solid #555; cursor:pointer; }
.ctrl input[type=range]:hover::-webkit-slider-thumb { border-color:#F7C623; }
.ctrl .val { width:38px; text-align:right; font-size:12px; color:#4db8ff; font-variant-numeric:tabular-nums; }

.track-temp  { background:linear-gradient(to right,#4488ff,#555,#ff9933); }
.track-tint  { background:linear-gradient(to right,#33cc66,#555,#cc33cc); }
.track-sat   { background:linear-gradient(to right,#666,#888,#ff4422); }
.track-exp   { background:linear-gradient(to right,#111,#555,#eee); }
.track-con   { background:linear-gradient(to right,#444,#888,#fff); }
.track-hi    { background:linear-gradient(to right,#444,#777,#fff); }
.track-sh    { background:linear-gradient(to right,#000,#444,#888); }
.track-wh    { background:linear-gradient(to right,#555,#888,#fff); }
.track-bk    { background:linear-gradient(to right,#000,#333,#666); }
.track-neu   { background:linear-gradient(to right,#333,#666,#999); }

.wb-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.wb-label { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:0.06em; }
.wb-auto { background:none; border:1px solid #444; color:#888; padding:3px 8px; border-radius:4px; cursor:pointer; font-size:11px; }
.wb-auto:hover { border-color:#F7C623; color:#F7C623; }

#bottom { padding:12px 14px; border-top:1px solid #2d2d2d; display:flex; flex-direction:column; gap:8px; }
#ffmpeg-out { background:#111; border:1px solid #2d2d2d; border-radius:6px; padding:8px 10px; font-size:10px; font-family:monospace; color:#4db8ff; line-height:1.5; max-height:60px; overflow-y:auto; word-break:break-all; }
.btn-row { display:flex; gap:8px; }
.btn { flex:1; padding:7px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:600; }
.btn-copy  { background:#2d2d2d; color:#ccc; }
.btn-copy:hover { background:#3a3a3a; }
.btn-reset { background:#2d2d2d; color:#888; }
.btn-reset:hover { background:#3a3a3a; color:#ccc; }
.btn-render { background:#F7C623; color:#111; }
.btn-render:hover { background:#ffe040; }
.btn-render.loading { background:#555; color:#888; cursor:wait; }
#status { font-size:11px; color:#4db8ff; text-align:center; min-height:16px; }

#main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#141414; }
#frame-tabs { display:flex; background:#1e1e1e; border-bottom:1px solid #2d2d2d; }
.tab { background:none; border:none; border-bottom:2px solid transparent; color:#666; padding:10px 18px; cursor:pointer; font-size:12px; font-weight:500; }
.tab.active { color:#F7C623; border-bottom-color:#F7C623; }
.tab:hover:not(.active) { color:#999; }

#viewer { flex:1; display:flex; overflow:hidden; }
.pane { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
.pane-label { text-align:center; padding:5px; font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.1em; background:#1a1a1a; flex-shrink:0; }
.pane-img-wrap { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#111; }
.pane-img-wrap img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
.divider-v { width:1px; background:#2d2d2d; flex-shrink:0; }

.spinner { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); z-index:10; pointer-events:none; }
.spinner.active { display:flex; }
.spinner-ring { width:32px; height:32px; border:3px solid #333; border-top-color:#F7C623; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.preview-badge { position:absolute; top:30px; right:8px; background:#F7C623; color:#111; font-size:9px; font-weight:700; padding:2px 6px; border-radius:3px; letter-spacing:0.05em; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.preview-badge.show { opacity:1; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-scroll">

    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="arrow">▾</span> Color
      </div>
      <div class="section-body">
        <div class="wb-row">
          <span class="wb-label">White Balance</span>
          <button class="wb-auto" onclick="resetWB()">Reset WB</button>
        </div>
        <div class="ctrl"><label>Temperature</label><input type="range" id="s-temp" class="track-temp" min="-100" max="100" step="1" value="0"><span class="val" id="v-temp">0</span></div>
        <div class="ctrl"><label>Tint</label><input type="range" id="s-tint" class="track-tint" min="-100" max="100" step="1" value="0"><span class="val" id="v-tint">0</span></div>
        <div class="ctrl"><label>Saturation</label><input type="range" id="s-sat" class="track-sat" min="-100" max="100" step="1" value="20"><span class="val" id="v-sat">+20</span></div>
      </div>
    </div>

    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="arrow">▾</span> Light
      </div>
      <div class="section-body">
        <div class="ctrl"><label>Exposure</label><input type="range" id="s-exp" class="track-exp" min="-3" max="3" step="0.05" value="0"><span class="val" id="v-exp">0.0</span></div>
        <div class="ctrl"><label>Contrast</label><input type="range" id="s-con" class="track-con" min="-100" max="100" step="1" value="6"><span class="val" id="v-con">+6</span></div>
        <div class="ctrl"><label>Highlights</label><input type="range" id="s-hi" class="track-hi" min="-100" max="100" step="1" value="0"><span class="val" id="v-hi">0</span></div>
        <div class="ctrl"><label>Shadows</label><input type="range" id="s-sh" class="track-sh" min="-100" max="100" step="1" value="0"><span class="val" id="v-sh">0</span></div>
        <div class="ctrl"><label>Whites</label><input type="range" id="s-wh" class="track-wh" min="-100" max="100" step="1" value="0"><span class="val" id="v-wh">0</span></div>
        <div class="ctrl"><label>Blacks</label><input type="range" id="s-bk" class="track-bk" min="-100" max="100" step="1" value="0"><span class="val" id="v-bk">0</span></div>
      </div>
    </div>

    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="arrow">▾</span> Detail
      </div>
      <div class="section-body">
        <div class="ctrl"><label>Gamma</label><input type="range" id="s-gamma" class="track-neu" min="-100" max="100" step="1" value="0"><span class="val" id="v-gamma">0</span></div>
        <div class="ctrl"><label>Gamma R</label><input type="range" id="s-gr" class="track-neu" min="-100" max="100" step="1" value="0"><span class="val" id="v-gr">0</span></div>
        <div class="ctrl"><label>Gamma G</label><input type="range" id="s-gg" class="track-neu" min="-100" max="100" step="1" value="0"><span class="val" id="v-gg">0</span></div>
        <div class="ctrl"><label>Gamma B</label><input type="range" id="s-gb" class="track-neu" min="-100" max="100" step="1" value="0"><span class="val" id="v-gb">0</span></div>
      </div>
    </div>

  </div>

  <div id="bottom">
    <div id="ffmpeg-out"></div>
    <div class="btn-row">
      <button class="btn btn-copy"  onclick="copyCmd()">Copy</button>
      <button class="btn btn-reset" onclick="resetAll()">Reset</button>
      <button class="btn btn-render" id="render-btn" onclick="doRender()">⚡ Render</button>
    </div>
    <div id="status"></div>
  </div>
</div>

<div id="main">
  <div id="frame-tabs"></div>
  <div id="viewer">
    <div class="pane">
      <div class="pane-label">Before</div>
      <div class="pane-img-wrap"><img id="img-before" src=""></div>
    </div>
    <div class="divider-v"></div>
    <div class="pane">
      <div class="pane-label">After — <span id="preview-status" style="color:#F7C623">loading...</span></div>
      <div class="pane-img-wrap"><img id="img-after" src=""></div>
      <div class="spinner" id="spinner"><div class="spinner-ring"></div></div>
      <div class="preview-badge" id="live-badge">LIVE FFMPEG</div>
    </div>
  </div>
</div>

<script>
const TIMESTAMPS = [2, 8, 25, 62, 78];
const LABELS     = ['2s','8s','25s','62s','78s'];
let currentFrame = 0;
let debounceTimer = null;
let previewSeq = 0;   // used to discard stale responses

// Build tabs
const tabsEl = document.getElementById('frame-tabs');
TIMESTAMPS.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (i===0?' active':'');
  btn.textContent = LABELS[i];
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFrame = i;
    loadBefore(t);
    schedulePreview(0);  // immediate
  };
  tabsEl.appendChild(btn);
});

// ── Fetch before frame (baseline, no color correction) ──
async function loadBefore(t) {
  const resp = await fetch('/preview', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({mode:'before', timestamp:t, vals:{}})
  });
  if (!resp.ok) return;
  const blob = await resp.blob();
  document.getElementById('img-before').src = URL.createObjectURL(blob);
}

// ── Fetch after frame (with current slider values via ffmpeg) ──
async function fetchAfter() {
  const seq = ++previewSeq;
  const t = TIMESTAMPS[currentFrame];
  const v = getVals();

  document.getElementById('spinner').classList.add('active');
  document.getElementById('preview-status').textContent = 'rendering...';

  try {
    const resp = await fetch('/preview', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mode:'after', timestamp:t, vals:v})
    });
    if (!resp.ok || seq !== previewSeq) return;  // stale or error
    const blob = await resp.blob();
    if (seq !== previewSeq) return;
    const url = URL.createObjectURL(blob);
    document.getElementById('img-after').src = url;
    document.getElementById('preview-status').textContent = '✓ ffmpeg accurate';
    const badge = document.getElementById('live-badge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 1200);
  } catch(e) {
    document.getElementById('preview-status').textContent = 'error';
  } finally {
    if (seq === previewSeq) document.getElementById('spinner').classList.remove('active');
  }
}

function schedulePreview(delay=500) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchAfter, delay);
}

// ── Sliders ──
function getVals() {
  return {
    temp: getV('temp'), tint: getV('tint'), sat: getV('sat'),
    exp:  getV('exp'),  con:  getV('con'),  hi:  getV('hi'),
    sh:   getV('sh'),   wh:   getV('wh'),   bk:  getV('bk'),
    gamma:getV('gamma'),gr:   getV('gr'),   gg:  getV('gg'),  gb: getV('gb')
  };
}
function getV(id) { return parseFloat(document.getElementById('s-'+id).value); }

function sign(v) { return v > 0 ? '+'+v : String(v); }

function updateLabels() {
  const v = getVals();
  document.getElementById('v-temp').textContent  = sign(v.temp);
  document.getElementById('v-tint').textContent  = sign(v.tint);
  document.getElementById('v-sat').textContent   = sign(v.sat);
  document.getElementById('v-exp').textContent   = (v.exp>=0?'+':'')+v.exp.toFixed(2);
  document.getElementById('v-con').textContent   = sign(v.con);
  document.getElementById('v-hi').textContent    = sign(v.hi);
  document.getElementById('v-sh').textContent    = sign(v.sh);
  document.getElementById('v-wh').textContent    = sign(v.wh);
  document.getElementById('v-bk').textContent    = sign(v.bk);
  document.getElementById('v-gamma').textContent = sign(v.gamma);
  document.getElementById('v-gr').textContent    = sign(v.gr);
  document.getElementById('v-gg').textContent    = sign(v.gg);
  document.getElementById('v-gb').textContent    = sign(v.gb);

  // Build ffmpeg filter string (same logic as server)
  const cR = (v.temp*0.003).toFixed(4), cG = (v.tint*0.002).toFixed(4), cB = (-v.temp*0.003).toFixed(4);
  const cb = `colorbalance=rs=${cR}:gs=${cG}:bs=${cB}:rm=${cR}:gm=${cG}:bm=${cB}:rh=${cR}:gh=${cG}:bh=${cB}`;
  const sat = ((v.sat+100)/100).toFixed(4);
  const con = (1+v.con*0.005).toFixed(4);
  const g   = Math.pow(10,-v.gamma/100).toFixed(4);
  const gr  = Math.pow(10,-v.gr/100).toFixed(4);
  const gg2 = Math.pow(10,-v.gg/100).toFixed(4);
  const gb  = Math.pow(10,-v.gb/100).toFixed(4);
  const eq  = `eq=brightness=0:contrast=${con}:saturation=${sat}:gamma=${g}:gamma_r=${gr}:gamma_g=${gg2}:gamma_b=${gb}`;
  const S=0.0025,CS=0.0025,ca=v.con*CS,ef=Math.pow(2,v.exp);
  function cp(x,d){return Math.max(0,Math.min(1,x*ef+d)).toFixed(4);}
  const pts=`0/${cp(0,v.bk*S)} 0.25/${cp(0.25,v.sh*S-ca*0.4)} 0.5/${cp(0.5,0)} 0.75/${cp(0.75,v.hi*S+ca*0.4)} 1/${cp(1,v.wh*S)}`;
  document.getElementById('ffmpeg-out').textContent = `${cb},\n${eq},\ncurves=master='${pts}'`;
}

document.querySelectorAll('input[type=range]').forEach(s => {
  s.addEventListener('input', () => { updateLabels(); schedulePreview(500); });
});

function resetAll() {
  const d = {temp:0,tint:0,sat:20,exp:0,con:6,hi:0,sh:0,wh:0,bk:0,gamma:0,gr:0,gg:0,gb:0};
  Object.entries(d).forEach(([k,v]) => document.getElementById('s-'+k).value = v);
  updateLabels(); schedulePreview(0);
}
function resetWB() {
  document.getElementById('s-temp').value = 0;
  document.getElementById('s-tint').value = 0;
  updateLabels(); schedulePreview(0);
}
function toggleSection(h) {
  h.classList.toggle('collapsed');
  h.nextElementSibling.style.display = h.classList.contains('collapsed') ? 'none' : '';
}
function copyCmd() {
  navigator.clipboard.writeText(document.getElementById('ffmpeg-out').textContent);
  const b = document.querySelector('.btn-copy');
  b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1500);
}
async function doRender() {
  const btn = document.getElementById('render-btn');
  const status = document.getElementById('status');
  btn.classList.add('loading'); btn.textContent='⏳ Rendering...';
  status.textContent='Full pipeline running (~2 min)…';
  try {
    const resp = await fetch('/render',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(getVals())});
    const d = await resp.json();
    status.textContent = d.ok ? '✓ Saved as final_v7.mp4' : '✗ '+d.error;
  } catch(e) { status.textContent='✗ Server error'; }
  finally { btn.classList.remove('loading'); btn.textContent='⚡ Render'; }
}

// Init
updateLabels();
loadBefore(TIMESTAMPS[0]);
schedulePreview(200);
</script>
</body>
</html>
