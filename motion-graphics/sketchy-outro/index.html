<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #ffffff;
      }

      #logo-wrap {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #logo-img {
        width: 560px;
        opacity: 0;
        transform-origin: 50% 50%;
      }
    </style>
  </head>
  <body>
    <div
      id="stage"
      data-composition-id="outro"
      data-start="0"
      data-duration="4"
      data-width="1080"
      data-height="1920"
    >
      <div id="logo-wrap" class="clip" data-start="0" data-duration="4" data-track-index="1">
        <img id="logo-img" src="assets/logo_black.png" />
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Logo pops in: scale 0 → 1.06 → 1 with back.out bounce
      tl.fromTo(
        "#logo-img",
        { opacity: 0, scale: 0, transformOrigin: "50% 50%" },
        { opacity: 1, scale: 1, duration: 0.7, ease: "back.out(1.8)" },
        0.35
      );

      window.__timelines["outro"] = tl;
    </script>
  </body>
</html>
